<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Poppins', sans-serif;
}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius:20px;
  padding:25px;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.profile-img{
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid #00e5ff;
  object-fit:cover;
  margin-bottom:15px;
}

h1{
  font-size:28px;
  color:#00e5ff;
  margin-bottom:5px;
}

.members-count{
  font-size:14px;
  color:#ccc;
  margin-bottom:15px;
}

.badge-row{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.badge{
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  background:rgba(255,255,255,0.08);
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:20px;
}

.card{
  background:rgba(0,0,0,0.4);
  padding:12px;
  border-radius:10px;
}

.val{
  font-size:18px;
  font-weight:bold;
}

.label{
  font-size:11px;
  color:#aaa;
}

.tg-button{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  background:#00e5ff;
  color:#000;
  padding:15px;
  border-radius:12px;
  font-weight:bold;
  text-decoration:none;
  margin:20px 0;
  transition:0.3s;
}

.tg-button:hover{
  background:#00bcd4;
}

.features-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:20px;
}

.f-item i{
  font-size:18px;
  margin-bottom:5px;
}

.f-item span{
  font-size:10px;
  color:#ccc;
}

.footer-info{
  font-size:11px;
  color:#888;
}

</style>
</head>

<body>

</div>

</html>
