<meta charset="UTF-8">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b0d14;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background-image:
      linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size:40px 40px;
}

.container{
    width:380px;
    text-align:center;
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    border:3px solid #00ff66;
    margin:auto;
    overflow:hidden;
    box-shadow:0 0 15px #00ff66;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

h1{
    color:#ffcc33;
    margin:20px 0;
    font-size:40px;
    font-weight:900;
}

.badges{
    display:flex;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
}

.badge{
    border:2px solid #ffb300;
    padding:10px 15px;
    border-radius:30px;
    color:#ffcc33;
    font-weight:bold;
    font-size:14px;
}

.stats{
    display:flex;
    gap:10px;
    margin-top:25px;
}

.card{
    flex:1;
    background:#111;
    border:1px solid #333;
    border-radius:15px;
    padding:20px 10px;
}

.card h2{
    color:#ffcc33;
    margin-bottom:8px;
}

.card.red{
    border:2px solid #ff5a5a;
}

.join-btn{
    display:block;
    margin-top:25px;
    text-decoration:none;
    background:linear-gradient(90deg,#25D366,#128C7E);
    color:white;
    padding:20px;
    border-radius:18px;
    font-size:28px;
    font-weight:bold;
    border:3px solid white;
    box-shadow:0 0 20px rgba(37,211,102,.5);
}

.join-btn:hover{
    transform:scale(1.03);
}

.features{
    margin-top:25px;
    border:2px solid #555;
    border-radius:20px;
    padding:25px;
    display:flex;
    justify-content:space-between;
}

.feature i{
    font-size:28px;
    margin-bottom:10px;
}

.green{color:#00ff66;}
.yellow{color:#ffd700;}
.orange{color:#ff7b39;}

.footer{
    margin-top:25px;
    color:#bbb;
    font-size:14px;
    line-height:1.8;
}
</style>

<body>

<div class="container">

    <!-- Logo -->
    <div class="logo">
        <img src="logo.png" alt="Logo">
    </div>

    <h1>🏏 CRIC ZONE™</h1>

    <!-- Top Badges -->
    <div class="badges">
        <div class="badge">🏆 Expert Analysis</div>
        <div class="badge">⚡ Live Updates</div>
        <div class="badge">⭐ Trusted</div>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="card">
            <h2>25,000+</h2>
            <p>Match Insights</p>
        </div>

        <div class="card red">
            <h2>99%</h2>
            <p>Accuracy</p>
        </div>

        <div class="card">
            <h2>4.9★</h2>
            <p>Rating</p>
        </div>
    </div>

    <!-- WhatsApp Button -->
    <a href="https://whatsapp.com/channel/0029Vb8GVJm0gcfMeqRRBz3g"
       class="join-btn"
       target="_blank">
       <i class="fa-brands fa-whatsapp"></i>
       Join My WhatsApp Channel
    </a>

    <!-- Features -->
    <div class="features">

        <div class="feature">
            <i class="fa-solid fa-circle-check green"></i>
            <p>Verified</p>
        </div>

        <div class="feature">
            <i class="fa-solid fa-lock yellow"></i>
            <p>Secure</p>
        </div>

        <div class="feature">
            <i class="fa-solid fa-chart-line orange"></i>
            <p>Insights</p>
        </div>

        <div class="feature">
            <i class="fa-solid fa-star yellow"></i>
            <p>Top Rated</p>
        </div>

    </div>

    <!-- Footer -->
    <div class="footer">
        © 2026 CRIC ZONE™. All Rights Reserved.<br>
        Cricket Analysis • Match Insights • Live Updates
    </div>

</div>
